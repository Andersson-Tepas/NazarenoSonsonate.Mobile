<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>NazarenoSonsonate.Mobile</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="NazarenoSonsonate.Mobile.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Lo dejo porque tu mapa admin todavía usa Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <script>
        window.googleMapsReady = false;
        window.nazarenoGoogleMapsLoaded = function () {
            window.googleMapsReady = true;
        };
    </script>
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

    <!-- Leaflet se queda solo por el mapa admin -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <!-- Reemplaza TU_API_KEY_AQUI por tu clave -->
    <script async defer
            src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBfVQADIjXfJSWGD-14tz4cuLfc8Pv8pcA&loading=async&callback=nazarenoGoogleMapsLoaded"></script>

    <script src="js/mapaRecorrido.js"></script>
    <script src="js/mapaRecorridoAdmin.js"></script>

</body>
</html>
