<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>NazarenoSonsonate.Mobile</title>
    <base href="/" />

    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="NazarenoSonsonate.Mobile.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <style>
        body {
            background-color: #2b002a;
            margin: 0;
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <div class="status-bar-safe-area"></div>

    <div id="app"></div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

    <script>
        window.recorridosScroll = {
            save: function () {
                window.__recorridosScrollY = window.scrollY || 0;
            },
            restore: function () {
                const y = window.__recorridosScrollY || 0;

                const html = document.documentElement;
                const body = document.body;

                const prevHtmlBehavior = html.style.scrollBehavior;
                const prevBodyBehavior = body.style.scrollBehavior;

                html.style.scrollBehavior = "auto";
                body.style.scrollBehavior = "auto";

                window.scrollTo({
                    top: y,
                    left: 0,
                    behavior: "instant"
                });

                setTimeout(() => {
                    html.style.scrollBehavior = prevHtmlBehavior;
                    body.style.scrollBehavior = prevBodyBehavior;
                }, 0);
            },
            clear: function () {
                window.__recorridosScrollY = 0;
            }
        };
    </script>
</body>
</html>
